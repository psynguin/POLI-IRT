name: Deploy ShinyLive App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Shinylive and Dependencies
        run: |
          install.packages(c("shinylive", "httpuv", "remotes"))
          # Install app dependencies from DESCRIPTION
          remotes::install_deps("app")
        shell: Rscript {0}

      - name: Export App to Shinylive
        run: |
          shinylive::export("app", "site")
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
