name: Deploy ShinyLive App

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Required permissions for artifact deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install Shinylive and Dependencies
        run: |
          install.packages(c("shinylive", "httpuv", "remotes"))
          remotes::install_deps("app")
        shell: Rscript {0}

      - name: Export App to Shinylive
        run: shinylive::export("app", "site")
        shell: Rscript {0}

      - name: Disable Jekyll
        run: touch site/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
